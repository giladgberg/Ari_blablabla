<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ari Blablabla - Space Fart Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #0f0;
  overflow: hidden;
}
#gameContainer {
  display: flex;
  gap: 0;
  position: relative;
}
canvas {
  border: 2px solid #0f0;
  display: block;
}
#sidebar {
  width: 160px;
  background: rgba(0,20,0,0.9);
  border: 2px solid #0f0;
  border-left: none;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#sidebar h3 {
  text-align: center;
  font-size: 14px;
  color: #0f0;
  border-bottom: 1px solid #0f0;
  padding-bottom: 5px;
}
.weapon-slot {
  border: 2px solid #333;
  padding: 8px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 11px;
  text-align: center;
  transition: all 0.2s;
  position: relative;
}
.weapon-slot.active {
  border-color: #0f0;
  background: rgba(0,255,0,0.1);
  box-shadow: 0 0 10px rgba(0,255,0,0.3);
}
.weapon-slot.locked {
  opacity: 0.3;
  cursor: default;
}
.weapon-slot .key {
  position: absolute;
  top: 2px;
  right: 4px;
  font-size: 9px;
  color: #888;
}
.weapon-name { font-weight: bold; margin-bottom: 2px; }
.weapon-desc { font-size: 9px; color: #888; }
#controls-info {
  text-align: center;
  font-size: 10px;
  color: #555;
  margin-top: auto;
  line-height: 1.6;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="700" height="600"></canvas>
  <div id="sidebar">
    <h3>WEAPONS</h3>
    <div id="weaponSlots"></div>
    <div id="controls-info">
      WASD/Arrows: Move<br>
      Space: Shoot<br>
      1-4: Weapons<br>
      P: Pause
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ============ AUDIO ============
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioResumed = false;
function resumeAudio() { if (!audioResumed) { audioCtx.resume(); audioResumed = true; } }
function playSound(freq, duration, type = 'square', vol = 0.1) {
  resumeAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = vol;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxShoot() { playSound(200, 0.1, 'sawtooth', 0.05); }
function sfxSonic() { playSound(600, 0.15, 'sine', 0.06); }
function sfxStink() { playSound(100, 0.2, 'triangle', 0.07); }
function sfxToxic() { playSound(350, 0.25, 'sine', 0.05); }
function sfxHit() { playSound(150, 0.1, 'square', 0.08); }
function sfxPickup() { playSound(800, 0.15, 'sine', 0.06); playSound(1200, 0.15, 'sine', 0.04); }
function sfxExplosion() { playSound(80, 0.3, 'sawtooth', 0.1); }
function sfxDamage() { playSound(100, 0.2, 'square', 0.1); }

// ============ WEAPONS ============
const WEAPONS = [
  { name: 'Air Fart', desc: 'Gas cloud', color: 'rgba(100,200,50,0.7)', bulletType: 'gas', damage: 1, speed: 5, fireRate: 200, unlocked: true },
  { name: 'Sonic Boom', desc: 'Shockwave ring', color: 'rgba(50,150,255,0.8)', bulletType: 'sonic', damage: 2, speed: 8, fireRate: 300, unlocked: false },
  { name: 'Stink Bomb', desc: 'Area splash', color: 'rgba(139,90,43,0.8)', bulletType: 'stink', damage: 3, speed: 4, fireRate: 500, unlocked: false },
  { name: 'Toxic Cloud', desc: 'Homing gas', color: 'rgba(180,50,255,0.8)', bulletType: 'toxic', damage: 2, speed: 4, fireRate: 350, unlocked: false },
];

// ============ STAGES ============
const STAGES = [
  {
    name: 'Nebula Fields', bgColor1: '#0a0020', bgColor2: '#1a0040',
    starColor: '#8080ff', enemyCount: 15, enemySpeed: 1.5, enemyHP: 1,
    enemyShoot: false, spawnRate: 1500, enemyType: 'blob',
    enemyColors: ['#ff4466', '#ff66aa', '#aa44ff', '#66aaff'],
  },
  {
    name: 'Asteroid Belt', bgColor1: '#1a1000', bgColor2: '#2a1800',
    starColor: '#aa8844', enemyCount: 20, enemySpeed: 2, enemyHP: 2,
    enemyShoot: false, spawnRate: 1200, enemyType: 'triangle',
    enemyColors: ['#ff8800', '#ffaa00', '#ff6600', '#cc4400'],
    hasObstacles: true,
  },
  {
    name: 'Ice Galaxy', bgColor1: '#001020', bgColor2: '#002040',
    starColor: '#88ddff', enemyCount: 25, enemySpeed: 2.5, enemyHP: 2,
    enemyShoot: true, spawnRate: 1000, enemyType: 'crystal',
    enemyColors: ['#00ffff', '#44ddff', '#88aaff', '#aaeeff'],
  },
  {
    name: 'Fire Dimension', bgColor1: '#200000', bgColor2: '#400800',
    starColor: '#ff4400', enemyCount: 30, enemySpeed: 3, enemyHP: 3,
    enemyShoot: true, spawnRate: 800, enemyType: 'flame',
    enemyColors: ['#ff2200', '#ff4400', '#ff6600', '#ffaa00'],
  },
  {
    name: 'Dark Void', bgColor1: '#050505', bgColor2: '#0a0a0a',
    starColor: '#333', enemyCount: 20, enemySpeed: 3, enemyHP: 3,
    enemyShoot: true, spawnRate: 900, enemyType: 'void',
    enemyColors: ['#8800ff', '#aa00ff', '#ff00aa', '#ff0066'],
    hasBoss: true,
  },
];

// ============ GAME STATE ============
let state = 'menu'; // menu, playing, stageIntro, stageComplete, gameOver, win
let currentStage = 0;
let score = 0;
let lives = 3;
let currentWeapon = 0;
let lastShot = 0;
let paused = false;
let stageTimer = 0;
let enemiesKilled = 0;
let enemiesSpawned = 0;
let lastSpawn = 0;
let introTimer = 0;
let completeTimer = 0;
let shieldTimer = 0;
let speedBoostTimer = 0;
let bossAlive = false;

// Stars background
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2 + 0.5, speed: Math.random() * 2 + 0.5 });
  }
}
initStars();

// Player
const player = {
  x: W / 2, y: H - 80, w: 40, h: 45, speed: 4, hp: 5, maxHp: 5,
  invincible: 0, animFrame: 0,
};

// Entity arrays
let bullets = [];
let enemies = [];
let enemyBullets = [];
let presentBoxes = [];
let particles = [];
let obstacles = [];

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') e.preventDefault();
  if (e.key === 'p' || e.key === 'P') {
    if (state === 'playing') paused = !paused;
  }
  if (e.key >= '1' && e.key <= '4') {
    const idx = parseInt(e.key) - 1;
    if (WEAPONS[idx].unlocked) currentWeapon = idx;
  }
  if (state === 'menu' && (e.key === ' ' || e.key === 'Enter')) startGame();
  if (state === 'gameOver' && (e.key === ' ' || e.key === 'Enter')) startGame();
  if (state === 'win' && (e.key === ' ' || e.key === 'Enter')) startGame();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ============ WEAPON SIDEBAR ============
function renderWeaponSidebar() {
  const container = document.getElementById('weaponSlots');
  container.innerHTML = '';
  WEAPONS.forEach((w, i) => {
    const div = document.createElement('div');
    div.className = 'weapon-slot' + (i === currentWeapon ? ' active' : '') + (!w.unlocked ? ' locked' : '');
    div.innerHTML = `<span class="key">${i+1}</span><div class="weapon-name" style="color:${w.color}">${w.name}</div><div class="weapon-desc">${w.unlocked ? w.desc : '???'}</div>`;
    if (w.unlocked) div.onclick = () => { currentWeapon = i; renderWeaponSidebar(); };
    container.appendChild(div);
  });
}
renderWeaponSidebar();

// ============ START / RESET ============
function startGame() {
  state = 'stageIntro';
  currentStage = 0;
  score = 0;
  lives = 3;
  currentWeapon = 0;
  player.hp = player.maxHp;
  player.x = W / 2;
  player.y = H - 80;
  player.invincible = 0;
  bullets = [];
  enemies = [];
  enemyBullets = [];
  presentBoxes = [];
  particles = [];
  obstacles = [];
  shieldTimer = 0;
  speedBoostTimer = 0;
  WEAPONS.forEach((w, i) => { w.unlocked = i === 0; });
  currentWeapon = 0;
  renderWeaponSidebar();
  initStage();
}

function initStage() {
  enemies = [];
  enemyBullets = [];
  bullets = [];
  presentBoxes = [];
  obstacles = [];
  enemiesKilled = 0;
  enemiesSpawned = 0;
  lastSpawn = 0;
  bossAlive = false;
  introTimer = 180; // 3 seconds at 60fps
  state = 'stageIntro';
}

// ============ SPAWNING ============
function spawnEnemy() {
  const stage = STAGES[currentStage];
  if (enemiesSpawned >= stage.enemyCount) return;
  const color = stage.enemyColors[Math.floor(Math.random() * stage.enemyColors.length)];
  const size = 20 + Math.random() * 15;
  enemies.push({
    x: 30 + Math.random() * (W - 60),
    y: -size,
    w: size, h: size,
    speed: stage.enemySpeed * (0.8 + Math.random() * 0.4),
    hp: stage.enemyHP,
    maxHp: stage.enemyHP,
    color: color,
    type: stage.enemyType,
    shootTimer: Math.random() * 120 + 60,
    canShoot: stage.enemyShoot,
    animFrame: Math.random() * 100,
    wobble: Math.random() * 2 - 1,
  });
  enemiesSpawned++;
}

function spawnBoss() {
  if (bossAlive) return;
  bossAlive = true;
  enemies.push({
    x: W / 2, y: -80,
    w: 80, h: 80,
    speed: 1,
    hp: 50,
    maxHp: 50,
    color: '#ff00ff',
    type: 'boss',
    shootTimer: 30,
    canShoot: true,
    animFrame: 0,
    wobble: 0,
    isBoss: true,
    phase: 0,
    moveDir: 1,
  });
}

function spawnPresentBox() {
  presentBoxes.push({
    x: 30 + Math.random() * (W - 60),
    y: -30,
    w: 30, h: 30,
    speed: 1.5,
    rotation: 0,
    type: getRandomPresent(),
  });
}

function getRandomPresent() {
  const r = Math.random();
  // Prioritize weapon unlocks if weapons are still locked
  const lockedWeapons = WEAPONS.map((w, i) => i).filter(i => !WEAPONS[i].unlocked);
  if (lockedWeapons.length > 0 && r < 0.3) return { kind: 'weapon', weaponIdx: lockedWeapons[0] };
  if (r < 0.5) return { kind: 'points', value: 100 + currentStage * 50 };
  if (r < 0.7) return { kind: 'shield' };
  if (r < 0.85) return { kind: 'health' };
  return { kind: 'speed' };
}

function spawnObstacle() {
  obstacles.push({
    x: Math.random() * (W - 40),
    y: -40,
    w: 30 + Math.random() * 20,
    h: 30 + Math.random() * 20,
    speed: 1 + Math.random(),
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.05,
  });
}

// ============ BULLETS ============
function shoot() {
  const now = Date.now();
  const weapon = WEAPONS[currentWeapon];
  if (now - lastShot < weapon.fireRate) return;
  lastShot = now;

  const bx = player.x;
  const by = player.y - player.h / 2;

  switch (weapon.bulletType) {
    case 'gas':
      sfxShoot();
      bullets.push({ x: bx, y: by, speed: weapon.speed, damage: weapon.damage, type: 'gas', size: 10, life: 1 });
      break;
    case 'sonic':
      sfxSonic();
      bullets.push({ x: bx, y: by, speed: weapon.speed, damage: weapon.damage, type: 'sonic', size: 8, life: 1 });
      break;
    case 'stink':
      sfxStink();
      bullets.push({ x: bx, y: by, speed: weapon.speed, damage: weapon.damage, type: 'stink', size: 15, life: 1, exploded: false });
      break;
    case 'toxic':
      sfxToxic();
      bullets.push({ x: bx, y: by, speed: weapon.speed, damage: weapon.damage, type: 'toxic', size: 8, life: 1, target: null });
      break;
  }
}

// ============ PARTICLES ============
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color: color,
      size: 2 + Math.random() * 4,
    });
  }
}

// ============ UPDATE ============
function update() {
  if (state !== 'playing' || paused) return;

  const stage = STAGES[currentStage];
  player.animFrame++;

  // Player movement
  const spd = player.speed * (speedBoostTimer > 0 ? 1.5 : 1);
  if (keys['arrowleft'] || keys['a']) player.x -= spd;
  if (keys['arrowright'] || keys['d']) player.x += spd;
  if (keys['arrowup'] || keys['w']) player.y -= spd;
  if (keys['arrowdown'] || keys['s']) player.y += spd;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
  player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y));

  // Shooting
  if (keys[' ']) shoot();

  // Timers
  if (shieldTimer > 0) shieldTimer--;
  if (speedBoostTimer > 0) speedBoostTimer--;
  if (player.invincible > 0) player.invincible--;

  // Spawn enemies
  const now = Date.now();
  if (stage.hasBoss && enemiesKilled >= stage.enemyCount - 1) {
    spawnBoss();
  } else if (now - lastSpawn > stage.spawnRate && enemiesSpawned < stage.enemyCount) {
    spawnEnemy();
    lastSpawn = now;
  }

  // Spawn present boxes
  if (Math.random() < 0.003) spawnPresentBox();

  // Spawn obstacles
  if (stage.hasObstacles && Math.random() < 0.008) spawnObstacle();

  // Update bullets
  bullets = bullets.filter(b => {
    if (b.type === 'toxic' && enemies.length > 0) {
      // Homing
      if (!b.target || b.target.hp <= 0) {
        let bestDist = Infinity;
        b.target = null;
        enemies.forEach(e => {
          const d = Math.hypot(e.x - b.x, e.y - b.y);
          if (d < bestDist) { bestDist = d; b.target = e; }
        });
      }
      if (b.target) {
        const angle = Math.atan2(b.target.y - b.y, b.target.x - b.x);
        b.x += Math.cos(angle) * b.speed;
        b.y += Math.sin(angle) * b.speed;
      } else {
        b.y -= b.speed;
      }
    } else {
      b.y -= b.speed;
    }
    return b.y > -20 && b.y < H + 20 && b.x > -20 && b.x < W + 20;
  });

  // Update enemies
  enemies.forEach(e => {
    e.animFrame++;
    if (e.isBoss) {
      // Boss movement pattern
      if (e.y < 80) {
        e.y += e.speed;
      } else {
        e.x += e.moveDir * 2;
        if (e.x > W - 60 || e.x < 60) e.moveDir *= -1;
        // Boss shoots
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          e.shootTimer = 20 + Math.random() * 20;
          const angle = Math.atan2(player.y - e.y, player.x - e.x);
          enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4, size: 6, color: '#ff00ff' });
          // Spread shot at low hp
          if (e.hp < e.maxHp * 0.5) {
            enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vx: Math.cos(angle - 0.3) * 4, vy: Math.sin(angle - 0.3) * 4, size: 5, color: '#ff44ff' });
            enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vx: Math.cos(angle + 0.3) * 4, vy: Math.sin(angle + 0.3) * 4, size: 5, color: '#ff44ff' });
          }
        }
      }
    } else {
      e.y += e.speed;
      e.x += Math.sin(e.animFrame * 0.03) * e.wobble;
      // Enemy shooting
      if (e.canShoot) {
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          e.shootTimer = 100 + Math.random() * 80;
          enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vx: 0, vy: 3, size: 4, color: e.color });
        }
      }
    }
  });

  // Remove off-screen enemies (non-boss) — count escaped enemies as killed for progression
  enemies = enemies.filter(e => {
    if (e.isBoss) return true;
    if (e.y >= H + 50) {
      enemiesKilled++;
      return false;
    }
    return true;
  });

  // Update enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.x > -10 && b.x < W + 10 && b.y > -10 && b.y < H + 10;
  });

  // Update present boxes
  presentBoxes = presentBoxes.filter(b => {
    b.y += b.speed;
    b.rotation += 0.03;
    return b.y < H + 40;
  });

  // Update obstacles
  obstacles = obstacles.filter(o => {
    o.y += o.speed;
    o.rotation += o.rotSpeed;
    return o.y < H + 50;
  });

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vx *= 0.97;
    p.vy *= 0.97;
    return p.life > 0;
  });

  // ---- COLLISIONS ----
  // Bullets vs enemies
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (b.life <= 0) return;
      const dx = b.x - e.x;
      const dy = b.y - e.y;
      const dist = Math.hypot(dx, dy);
      const hitDist = (b.size + e.w) / 2;
      if (dist < hitDist) {
        e.hp -= b.damage;
        b.life = 0;
        sfxHit();
        spawnParticles(e.x, e.y, e.color, 5);
        if (b.type === 'stink' && !b.exploded) {
          b.exploded = true;
          // Area damage (skip primary target already hit)
          enemies.forEach(e2 => {
            if (e2 !== e && Math.hypot(b.x - e2.x, b.y - e2.y) < 60) {
              e2.hp -= 1;
              spawnParticles(e2.x, e2.y, e2.color, 3);
            }
          });
        }
        if (e.hp <= 0) {
          score += (e.isBoss ? 500 : 10) * (currentStage + 1);
          sfxExplosion();
          spawnParticles(e.x, e.y, e.color, 15);
          if (!e.isBoss) enemiesKilled++;
          else bossAlive = false;
        }
      }
    });
  });
  bullets = bullets.filter(b => b.life > 0);
  enemies = enemies.filter(e => e.hp > 0);

  // Enemy bullets vs player
  if (player.invincible <= 0) {
    enemyBullets = enemyBullets.filter(b => {
      if (Math.hypot(b.x - player.x, b.y - player.y) < 20) {
        if (shieldTimer > 0) {
          shieldTimer = 0;
          spawnParticles(player.x, player.y, '#00ffff', 10);
        } else {
          playerHit();
        }
        return false;
      }
      return true;
    });
  }

  // Enemies vs player
  if (player.invincible <= 0) {
    enemies.forEach(e => {
      if (Math.hypot(e.x - player.x, e.y - player.y) < (e.w + player.w) / 2) {
        if (shieldTimer > 0) {
          shieldTimer = 0;
          spawnParticles(player.x, player.y, '#00ffff', 10);
        } else {
          playerHit();
        }
      }
    });
  }

  // Obstacles vs player
  if (player.invincible <= 0) {
    obstacles.forEach(o => {
      if (Math.hypot(o.x + o.w/2 - player.x, o.y + o.h/2 - player.y) < (o.w + player.w) / 2) {
        if (shieldTimer > 0) {
          shieldTimer = 0;
        } else {
          playerHit();
        }
      }
    });
  }

  // Player vs present boxes
  presentBoxes = presentBoxes.filter(b => {
    if (Math.hypot(b.x - player.x, b.y - player.y) < 30) {
      sfxPickup();
      applyPresent(b.type);
      spawnParticles(b.x, b.y, '#ffff00', 10);
      return false;
    }
    return true;
  });

  // Stage completion check
  const stage2 = STAGES[currentStage];
  if (stage2.hasBoss) {
    if (enemiesKilled >= stage2.enemyCount - 1 && !bossAlive && enemies.filter(e => e.isBoss).length === 0 && enemiesSpawned > 0) {
      stageComplete();
    }
  } else if (enemiesKilled >= stage2.enemyCount) {
    stageComplete();
  }
}

function playerHit() {
  player.hp--;
  player.invincible = 90; // 1.5 seconds
  sfxDamage();
  spawnParticles(player.x, player.y, '#00ff00', 10);
  if (player.hp <= 0) {
    lives--;
    if (lives <= 0) {
      state = 'gameOver';
    } else {
      player.hp = player.maxHp;
      player.x = W / 2;
      player.y = H - 80;
    }
  }
}

function applyPresent(present) {
  switch (present.kind) {
    case 'weapon':
      WEAPONS[present.weaponIdx].unlocked = true;
      currentWeapon = present.weaponIdx;
      renderWeaponSidebar();
      break;
    case 'points':
      score += present.value;
      break;
    case 'shield':
      shieldTimer = 300; // 5 seconds
      break;
    case 'health':
      player.hp = Math.min(player.hp + 2, player.maxHp);
      break;
    case 'speed':
      speedBoostTimer = 300;
      break;
  }
}

function stageComplete() {
  if (currentStage >= STAGES.length - 1) {
    state = 'win';
  } else {
    state = 'stageComplete';
    completeTimer = 180;
  }
}

// ============ DRAW ============
function draw() {
  const stage = STAGES[currentStage];

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, stage.bgColor1);
  grad.addColorStop(1, stage.bgColor2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = stage.starColor;
    ctx.globalAlpha = 0.3 + Math.random() * 0.5;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (state === 'menu') {
    drawMenu();
    return;
  }
  if (state === 'stageIntro') {
    drawStageIntro();
    introTimer--;
    if (introTimer <= 0) state = 'playing';
    return;
  }
  if (state === 'stageComplete') {
    drawStageComplete();
    completeTimer--;
    if (completeTimer <= 0) {
      currentStage++;
      initStage();
    }
    return;
  }
  if (state === 'gameOver') {
    drawGameEntities();
    drawGameOver();
    return;
  }
  if (state === 'win') {
    drawWin();
    return;
  }

  // Playing state
  drawGameEntities();
  drawHUD();

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#0f0';
    ctx.font = '40px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.font = '16px Courier New';
    ctx.fillText('Press P to resume', W/2, H/2 + 40);
  }
}

function drawGameEntities() {
  // Obstacles
  obstacles.forEach(o => {
    ctx.save();
    ctx.translate(o.x + o.w/2, o.y + o.h/2);
    ctx.rotate(o.rotation);
    ctx.fillStyle = '#665544';
    ctx.fillRect(-o.w/2, -o.h/2, o.w, o.h);
    ctx.strokeStyle = '#887766';
    ctx.strokeRect(-o.w/2, -o.h/2, o.w, o.h);
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e => drawEnemy(e));

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Player bullets
  bullets.forEach(b => drawBullet(b));

  // Present boxes
  presentBoxes.forEach(b => drawPresentBox(b));

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Player
  drawPlayer();
}

function drawPlayer() {
  const p = player;
  if (p.invincible > 0 && Math.floor(p.invincible / 5) % 2 === 0) return; // Blink

  ctx.save();
  ctx.translate(p.x, p.y);

  // Shield visual
  if (shieldTimer > 0) {
    ctx.strokeStyle = 'rgba(0,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Speed boost visual
  if (speedBoostTimer > 0) {
    ctx.fillStyle = 'rgba(255,255,0,0.2)';
    ctx.beginPath();
    ctx.arc(0, 5, 25, 0, Math.PI * 2);
    ctx.fill();
  }

  // Body - green gas cloud (view from behind)
  const wobble = Math.sin(p.animFrame * 0.1) * 2;

  // Main body cloud
  ctx.fillStyle = 'rgba(50,180,50,0.6)';
  ctx.beginPath();
  ctx.arc(0, 0, 18 + wobble * 0.5, 0, Math.PI * 2);
  ctx.fill();

  // Darker inner cloud
  ctx.fillStyle = 'rgba(30,140,30,0.7)';
  ctx.beginPath();
  ctx.arc(0, 2, 13, 0, Math.PI * 2);
  ctx.fill();

  // Top wisps (facing away from viewer)
  ctx.fillStyle = 'rgba(80,220,80,0.4)';
  ctx.beginPath();
  ctx.arc(-8 + wobble, -12, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8 - wobble, -10, 7, 0, Math.PI * 2);
  ctx.fill();

  // Side wisps
  ctx.fillStyle = 'rgba(60,200,60,0.3)';
  ctx.beginPath();
  ctx.arc(-15 + wobble, 2, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(15 - wobble, 4, 5, 0, Math.PI * 2);
  ctx.fill();

  // Trail behind (bottom = towards viewer = back trail)
  ctx.fillStyle = 'rgba(100,255,100,0.2)';
  ctx.beginPath();
  ctx.arc(-3 + wobble, 15, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(4 - wobble, 18, 5, 0, Math.PI * 2);
  ctx.fill();

  // Highlight glow
  ctx.fillStyle = 'rgba(150,255,150,0.3)';
  ctx.beginPath();
  ctx.arc(-3, -5, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.isBoss) {
    // Boss - large multi-eyed alien
    const pulse = Math.sin(e.animFrame * 0.05) * 5;
    ctx.fillStyle = e.color;
    ctx.globalAlpha = 0.8;
    // Body
    ctx.beginPath();
    ctx.arc(0, 0, 35 + pulse, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#440044';
    ctx.beginPath();
    ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.globalAlpha = 1;
    const eyePositions = [[-15,-10],[15,-10],[0,10],[-10,5],[10,5]];
    eyePositions.forEach(([ex, ey]) => {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex, ey, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f00';
      ctx.beginPath();
      ctx.arc(ex + 1, ey + 1, 3, 0, Math.PI * 2);
      ctx.fill();
    });
    // Health bar
    ctx.fillStyle = '#300';
    ctx.fillRect(-35, -50, 70, 6);
    ctx.fillStyle = '#f00';
    ctx.fillRect(-35, -50, 70 * (e.hp / e.maxHp), 6);
  } else {
    const wobble = Math.sin(e.animFrame * 0.08) * 3;
    ctx.globalAlpha = 0.85;

    switch (e.type) {
      case 'blob':
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(0, 0, e.w / 2 + wobble, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-5, -3, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -3, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-4, -2, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -2, 2, 0, Math.PI*2); ctx.fill();
        break;

      case 'triangle':
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.moveTo(0, -e.h/2 - wobble);
        ctx.lineTo(-e.w/2, e.h/2);
        ctx.lineTo(e.w/2, e.h/2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(0, 2, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(0, 3, 3, 0, Math.PI*2); ctx.fill();
        break;

      case 'crystal':
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.moveTo(0, -e.h/2);
        ctx.lineTo(e.w/2, 0);
        ctx.lineTo(0, e.h/2);
        ctx.lineTo(-e.w/2, 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath(); ctx.arc(-3, -5, 3, 0, Math.PI*2); ctx.fill();
        break;

      case 'flame':
        ctx.fillStyle = e.color;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(Math.sin(e.animFrame * 0.1 + i) * 5, i * 6 - 6, e.w/3, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.fillStyle = '#ff0';
        ctx.beginPath(); ctx.arc(0, -2, e.w/5, 0, Math.PI*2); ctx.fill();
        break;

      case 'void':
        ctx.fillStyle = e.color;
        ctx.beginPath();
        const sides = 6;
        for (let i = 0; i < sides; i++) {
          const angle = (i / sides) * Math.PI * 2 + e.animFrame * 0.02;
          const r = e.w / 2 + (i % 2 === 0 ? wobble : -wobble);
          ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
        }
        ctx.closePath();
        ctx.fill();
        // Center eye
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#800';
        ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
        break;
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);

  switch (b.type) {
    case 'gas':
      // Gas cloud bullet
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = 'rgba(100,200,50,0.6)';
      ctx.beginPath(); ctx.arc(0, 0, b.size, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(150,255,80,0.4)';
      ctx.beginPath(); ctx.arc(-3, 2, b.size * 0.6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -1, b.size * 0.5, 0, Math.PI*2); ctx.fill();
      break;

    case 'sonic':
      // Ring shape
      ctx.strokeStyle = 'rgba(50,150,255,0.8)';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, b.size, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(100,200,255,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, b.size + 3, 0, Math.PI*2); ctx.stroke();
      break;

    case 'stink':
      // Brown splash
      ctx.fillStyle = 'rgba(139,90,43,0.7)';
      ctx.beginPath(); ctx.arc(0, 0, b.size, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(100,60,20,0.5)';
      ctx.beginPath(); ctx.arc(-4, 3, b.size*0.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, -2, b.size*0.4, 0, Math.PI*2); ctx.fill();
      break;

    case 'toxic':
      // Purple homing
      ctx.fillStyle = 'rgba(180,50,255,0.7)';
      ctx.beginPath(); ctx.arc(0, 0, b.size, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(220,100,255,0.4)';
      ctx.beginPath(); ctx.arc(0, 3, b.size*0.6, 0, Math.PI*2); ctx.fill();
      // Trail
      ctx.fillStyle = 'rgba(180,50,255,0.2)';
      ctx.beginPath(); ctx.arc(0, 8, b.size*0.4, 0, Math.PI*2); ctx.fill();
      break;
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPresentBox(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.rotation);

  // Box
  const colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff'];
  ctx.fillStyle = colors[Math.floor(b.rotation * 2) % colors.length];
  ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);

  // Ribbon
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, -b.h/2);
  ctx.lineTo(0, b.h/2);
  ctx.moveTo(-b.w/2, 0);
  ctx.lineTo(b.w/2, 0);
  ctx.stroke();

  // Question mark
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', 0, 0);

  // Glow
  ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.005) * 0.2;
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 2;
  ctx.strokeRect(-b.w/2 - 3, -b.h/2 - 3, b.w + 6, b.h + 6);

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawHUD() {
  const stage = STAGES[currentStage];

  // Health bar
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(10, 10, 150, 20);
  ctx.fillStyle = player.hp > 2 ? '#0f0' : player.hp > 1 ? '#ff0' : '#f00';
  ctx.fillRect(10, 10, 150 * (player.hp / player.maxHp), 20);
  ctx.strokeStyle = '#0f0';
  ctx.strokeRect(10, 10, 150, 20);
  ctx.fillStyle = '#fff';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 15, 24);

  // Lives
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = 'rgba(50,180,50,0.6)';
    ctx.beginPath();
    ctx.arc(180 + i * 25, 20, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  // Score
  ctx.fillStyle = '#0f0';
  ctx.font = '16px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('SCORE: ' + score, W - 10, 25);

  // Stage
  ctx.textAlign = 'center';
  ctx.fillText('Stage ' + (currentStage + 1) + ': ' + stage.name, W / 2, 25);

  // Kill progress
  ctx.font = '11px Courier New';
  ctx.fillStyle = '#888';
  ctx.fillText(enemiesKilled + '/' + stage.enemyCount + ' aliens', W / 2, 42);
}

function drawMenu() {
  ctx.fillStyle = '#0f0';
  ctx.font = '50px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('ARI', W/2, H/2 - 100);
  ctx.fillText('BLABLABLA', W/2, H/2 - 45);

  ctx.font = '16px Courier New';
  ctx.fillStyle = '#8f8';
  ctx.fillText('~ Space Fart Shooter ~', W/2, H/2);

  // Draw hero preview
  ctx.save();
  ctx.translate(W/2, H/2 + 60);
  const w = Math.sin(Date.now() * 0.003) * 3;
  ctx.fillStyle = 'rgba(50,180,50,0.6)';
  ctx.beginPath(); ctx.arc(0, 0, 25 + w, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(80,220,80,0.4)';
  ctx.beginPath(); ctx.arc(-10 + w, -15, 10, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10 - w, -12, 9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(100,255,100,0.2)';
  ctx.beginPath(); ctx.arc(0, 20, 8, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#0f0';
  ctx.font = '18px Courier New';
  ctx.fillText('Press SPACE or ENTER to start', W/2, H/2 + 130);

  ctx.font = '12px Courier New';
  ctx.fillStyle = '#484';
  ctx.fillText('WASD/Arrows: Move | Space: Shoot | 1-4: Weapons | P: Pause', W/2, H/2 + 160);
}

function drawStageIntro() {
  const stage = STAGES[currentStage];
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#0f0';
  ctx.font = '40px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (currentStage + 1), W/2, H/2 - 30);

  ctx.font = '24px Courier New';
  ctx.fillStyle = stage.starColor;
  ctx.fillText(stage.name, W/2, H/2 + 20);

  ctx.font = '14px Courier New';
  ctx.fillStyle = '#888';
  ctx.fillText('Get ready...', W/2, H/2 + 60);
}

function drawStageComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#0f0';
  ctx.font = '36px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE COMPLETE!', W/2, H/2 - 20);

  ctx.font = '18px Courier New';
  ctx.fillStyle = '#8f8';
  ctx.fillText('Score: ' + score, W/2, H/2 + 30);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#f00';
  ctx.font = '50px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 30);

  ctx.fillStyle = '#0f0';
  ctx.font = '20px Courier New';
  ctx.fillText('Final Score: ' + score, W/2, H/2 + 20);
  ctx.fillText('Stage: ' + (currentStage + 1), W/2, H/2 + 50);

  ctx.font = '16px Courier New';
  ctx.fillStyle = '#888';
  ctx.fillText('Press SPACE to try again', W/2, H/2 + 90);
}

function drawWin() {
  const t = Date.now() * 0.002;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = `hsl(${t * 50 % 360}, 100%, 60%)`;
  ctx.font = '50px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('YOU WIN!', W/2, H/2 - 50);

  ctx.fillStyle = '#0f0';
  ctx.font = '24px Courier New';
  ctx.fillText('The galaxy is saved!', W/2, H/2);
  ctx.fillText('Final Score: ' + score, W/2, H/2 + 40);

  ctx.font = '16px Courier New';
  ctx.fillStyle = '#888';
  ctx.fillText('Press SPACE to play again', W/2, H/2 + 90);

  // Celebration particles
  if (Math.random() < 0.3) {
    spawnParticles(
      Math.random() * W, Math.random() * H,
      `hsl(${Math.random()*360},100%,60%)`, 3
    );
  }
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  particles = particles.filter(p => p.life > 0);
  ctx.globalAlpha = 1;
}

// ============ GAME LOOP ============
let lastWeaponState = '';
function gameLoop() {
  update();
  draw();
  // Only re-render sidebar when weapon state changes
  const weaponState = currentWeapon + ',' + WEAPONS.map(w => w.unlocked ? '1' : '0').join('');
  if (weaponState !== lastWeaponState) {
    lastWeaponState = weaponState;
    renderWeaponSidebar();
  }
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
